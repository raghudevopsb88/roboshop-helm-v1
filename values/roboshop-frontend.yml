appName: roboshop-frontend
appPort: 8080
serviceType: ClusterIP
readinessProbe:
  httpGet:
    path: /nginx-health
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1
livenessProbe:
  httpGet:
    path: /nginx-health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 5
startupProbe:
  httpGet:
    path: /nginx-health
    port: http
  initialDelaySeconds: 3
  periodSeconds: 3
  timeoutSeconds: 3
  failureThreshold: 20
config_values:
  NGINX_PORT: "8080"
  CATALOGUE_HOST: "roboshop-catalogue"
  CATALOGUE_PORT: "8080"
  USER_HOST: "roboshop-user"
  USER_PORT: "8080"
  CART_HOST: "roboshop-cart"
  CART_PORT: "8080"
  SHIPPING_HOST: "roboshop-shipping"
  SHIPPING_PORT: "8080"
  PAYMENT_HOST: "roboshop-payment"
  PAYMENT_PORT: "8080"
  RATINGS_HOST: "roboshop-ratings"
  RATINGS_PORT: "8080"
  ORDERS_HOST: "roboshop-orders"
  ORDERS_PORT: "8080"
PARAMS: "NGINX_PORT CATALOGUE_HOST CATALOGUE_PORT USER_HOST USER_PORT CART_HOST CART_PORT SHIPPING_HOST SHIPPING_PORT PAYMENT_HOST PAYMENT_PORT RATINGS_HOST RATINGS_PORT ORDERS_HOST ORDERS_PORT"
ingress:
  enabled: true
