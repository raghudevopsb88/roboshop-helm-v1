appName: roboshop-cart
appPort: 8080
serviceType: ClusterIP
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5
  failureThreshold: 3
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 15
  failureThreshold: 5
config_values:
  REDIS_HOST: "valkey.dev.roboshop.internal"
  CATALOGUE_HOST: "roboshop-catalogue"
  CATALOGUE_PORT: "8080"
  CART_SERVER_PORT: "8080"
PARAMS: "REDIS_HOST CATALOGUE_HOST CATALOGUE_PORT CART_SERVER_PORT"

resources:
  requests:
    cpu: 250m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

