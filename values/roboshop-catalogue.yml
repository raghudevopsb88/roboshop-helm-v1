appName: roboshop-catalogue
appPort: 8080
serviceType: ClusterIP
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 5
startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30
config_values:
  MYSQL_HOST: "mysql.dev.roboshop.internal"
  MYSQL_USER: "catalogue"
  MYSQL_PASSWORD: "RoboShop@1"
  MYSQL_DATABASE: "catalogue"
  CATALOGUE_SERVER_PORT: "8080"
PARAMS: "MYSQL_HOST MYSQL_USER MYSQL_PASSWORD MYSQL_DATABASE CATALOGUE_SERVER_PORT"
dbJob:
  enabled: true
  PARAMS: "MYSQL_HOST MYSQL_USER MYSQL_PASSWORD MYSQL_DATABASE MYSQL_ROOT_PASSWORD"
  imageTag: latest
