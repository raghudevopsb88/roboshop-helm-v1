appName: roboshop-payment
appPort: 8080
serviceType: ClusterIP
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 5
startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30
config_values:
  CART_HOST: "roboshop-cart"
  CART_PORT: "8080"
  USER_HOST: "roboshop-user"
  USER_PORT: "8080"
  AMQP_HOST: "rabbitmq.dev.roboshop.internal"
  AMQP_USER: "roboshop"
  AMQP_PASS: "RoboShop@1"
  SHOP_PAYMENT_PORT: "8080"
PARAMS: "CART_HOST CART_PORT USER_HOST USER_PORT AMQP_HOST AMQP_USER AMQP_PASS SHOP_PAYMENT_PORT"

resources:
  requests:
    cpu: 300m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1024Mi

