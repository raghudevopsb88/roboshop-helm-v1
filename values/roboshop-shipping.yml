appName: roboshop-shipping
appPort: 8080
serviceType: ClusterIP
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 5
startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 36
config_values:
  DB_HOST: "mysql.dev.roboshop.internal"
  DB_USER: "shipping"
  DB_PASS: "RoboShop@1"
  PORT: "8080"
PARAMS: "DB_HOST DB_USER DB_PASS PORT"
dbJob:
  enabled: true
  PARAMS: "DB_HOST MYSQL_ROOT_PASSWORD"
  imageTag: latest

resources:
  requests:
    cpu: 300m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1024Mi

