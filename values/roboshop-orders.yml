appName: roboshop-orders
appPort: 8080
serviceType: ClusterIP
config_values:
  MONGO_URL: "mongodb://mongodb.dev.roboshop.internal:27017/orders"
  AMQP_HOST: "rabbitmq.dev.roboshop.internal"
  AMQP_USER: "roboshop"
  AMQP_PASS: "RoboShop@1"
  SHIPPING_HOST: "roboshop-shipping"
  SHIPPING_PORT: "8080"
  PORT: "8080"
PARAMS: "MONGO_URL AMQP_HOST AMQP_USER AMQP_PASS SHIPPING_HOST SHIPPING_PORT PORT"

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

