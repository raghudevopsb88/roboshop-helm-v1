appName: roboshop-orders
appPort: 8080
serviceType: ClusterIP
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 5
startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 36
config_values:
  MONGO_URL: "mongodb://mongodb.dev.roboshop.internal:27017/orders"
  AMQP_HOST: "rabbitmq.dev.roboshop.internal"
  AMQP_USER: "roboshop"
  AMQP_PASS: "RoboShop@1"
  SHIPPING_HOST: "roboshop-shipping"
  SHIPPING_PORT: "8080"
  NOTIFICATION_URL: "http://roboshop-frontend:8080"
  PORT: "8080"
PARAMS: "MONGO_URL AMQP_HOST AMQP_USER AMQP_PASS SHIPPING_HOST SHIPPING_PORT NOTIFICATION_URL PORT"

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

