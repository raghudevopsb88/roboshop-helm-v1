apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.appName }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-9"
spec:
  type: {{ .Values.serviceType }}
  selector:
    appName: {{ .Values.appName }}
  ports:
    - protocol: TCP
      port: {{ .Values.appPort }}
      targetPort: {{ .Values.appPort }}
