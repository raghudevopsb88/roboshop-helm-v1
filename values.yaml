replicas: 2

# Slow rolling update: spin up 1 extra pod, wait until it is Ready + minReadySeconds, then terminate 1 old pod.
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Seconds a new pod must stay Ready (after probes pass) before the next old pod is removed.
minReadySeconds: 15

# Allow long rollouts when many replicas (one pod at a time).
progressDeadlineSeconds: 900

# preStop sleep: stay out of Service endpoints while existing connections drain (rolling updates).
lifecycle:
  preStop:
    exec:
      command:
        - sh
        - -c
        - sleep 60

# preStop (15s) + app graceful shutdown window.
terminationGracePeriodSeconds: 45

# Keep at least 1 pod available during voluntary disruptions (rollouts, node drain).
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# HTTP probes — all backends expose GET /health on appPort (frontend uses /nginx-health in its values file).
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 5

startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: false

dbJob:
  enabled: false
  PARAMS: ""
  imageTag: latest
